upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:3807;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Backend API — admin endpoints (CRUD, sync, upload)
    location /admin/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API — protocol-compatible endpoints (multipart)
    location ~ ^/(getTools|getCatalog|getPartList|loadPartInfo|getAddList|loadAdditemInfo|recviceMotorInfo|systemControl)$ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static uploads served by backend
    location /uploads/ {
        proxy_pass http://backend;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
