server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Use Docker's internal DNS resolver so upstream hosts are resolved
    # at request time (not startup), allowing backends to start later.
    resolver 127.0.0.11 valid=10s;

    # Backend API — admin endpoints (CRUD, sync, upload)
    location /admin/ {
        set $backend_upstream http://backend:3807;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API — static data endpoints
    location /api/data/ {
        set $backend_upstream http://backend:3807;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend API — protocol-compatible endpoints (multipart)
    location ~ ^/(getTools|getCatalog|getPartList|loadPartInfo|getAddList|loadAdditemInfo|recviceMotorInfo|systemControl)$ {
        set $backend_upstream http://backend:3807;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static uploads served by backend
    location /uploads/ {
        set $backend_upstream http://backend:3807;
        proxy_pass $backend_upstream;
    }

    # Everything else → Next.js frontend
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
